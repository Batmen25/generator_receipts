<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ДМ2 Мост-2 — Sales OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#07090f;--bg1:#0c0f1a;--bg2:#111520;--bg3:#171d2e;--bg4:#1d2438;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);
  --t1:#e8eaf2;--t2:#8892a6;--t3:#454d60;
  --blue:#4f8ef7;--blue-bg:rgba(79,142,247,.12);--blue-bd:rgba(79,142,247,.25);
  --green:#34d399;--green-bg:rgba(52,211,153,.11);--green-bd:rgba(52,211,153,.25);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,.11);--amber-bd:rgba(245,166,35,.25);
  --red:#f87171;--red-bg:rgba(248,113,113,.11);--red-bd:rgba(248,113,113,.25);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.11);
  --sidebar:224px;--r:10px;--r2:14px;
}
html,body{height:100%;background:var(--bg0);color:var(--t1);font-family:'Outfit',system-ui,sans-serif;font-size:14px;line-height:1.5;overflow-x:hidden}

/* ── Sidebar ── */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar);height:100vh;background:var(--bg1);border-right:1px solid var(--bd);display:flex;flex-direction:column;z-index:100}
.sb-logo{padding:22px 18px 18px;border-bottom:1px solid var(--bd);flex-shrink:0}
.sb-tag{font-size:9px;letter-spacing:4px;color:var(--blue);font-family:'IBM Plex Mono',monospace;font-weight:600;text-transform:uppercase;margin-bottom:5px}
.sb-name{font-size:16px;font-weight:700;color:var(--t1);letter-spacing:-.3px}
.sb-period{font-size:10px;color:var(--t3);margin-top:3px;font-family:'IBM Plex Mono',monospace}
.nav{flex:1;padding:14px 10px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);cursor:pointer;color:var(--t3);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;border:1px solid transparent;user-select:none}
.ni:hover{background:var(--bg3);color:var(--t1);border-color:var(--bd)}
.ni.active{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.ni svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.ni.active svg{opacity:1}
.sb-foot{padding:14px;border-top:1px solid var(--bd);flex-shrink:0}
.up-zone{border:1px dashed var(--bd2);border-radius:var(--r);padding:14px 12px;text-align:center;cursor:pointer;transition:all .2s;display:block}
.up-zone:hover,.up-zone.drag{background:var(--blue-bg);border-color:var(--blue-bd)}
.up-zone input{display:none}
.up-label{font-size:12px;color:var(--t2);font-weight:500;cursor:pointer;display:block}
.up-hint{font-size:10px;color:var(--t3);margin-top:3px}
.sb-keys{font-size:10px;color:var(--t3);text-align:center;margin-top:10px}

/* ── Main ── */
.main{margin-left:var(--sidebar);min-height:100vh;padding:32px 36px}
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-.4px}
.page-sub{font-size:12px;color:var(--t3);margin-top:4px}
.btn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--bd2);background:transparent;color:var(--t2);font-size:12px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.btn:hover{background:var(--bg3);color:var(--t1);border-color:var(--bd2)}
.btn-blue{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}
.btn-blue:hover{background:rgba(79,142,247,.2)}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;z-index:999;padding:12px 18px;border-radius:var(--r);font-size:12px;font-weight:500;transform:translateY(60px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;border:1px solid;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#0c2018;color:var(--green);border-color:var(--green-bd)}
.toast.err{background:#200c0c;color:var(--red);border-color:var(--red-bd)}
.toast.info{background:#0c1420;color:var(--blue);border-color:var(--blue-bd)}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:26px}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:18px 16px;position:relative;overflow:hidden;transition:border .15s}
.kpi:hover{border-color:var(--bd2)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--a,var(--blue))}
.kpi-l{font-size:9px;letter-spacing:2px;color:var(--t3);font-weight:700;text-transform:uppercase;margin-bottom:10px}
.kpi-v{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--t1);line-height:1}
.kpi-s{font-size:10px;color:var(--t3);margin-top:6px}

/* ── Card ── */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;margin-bottom:14px}
.card-h{padding:13px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.card-t{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t3);text-transform:uppercase}

/* ── Table ── */
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;border-bottom:1px solid var(--bd)}
td{padding:10px 16px;border-bottom:1px solid var(--bd);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--bg3)}

/* ── Tier ── */
.tier{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;flex-shrink:0}
.tA{background:var(--green-bg);color:var(--green)}
.tB{background:var(--blue-bg);color:var(--blue)}
.tC{background:var(--amber-bg);color:var(--amber)}
.tD{background:var(--red-bg);color:var(--red)}

/* ── VS badge ── */
.vs{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;white-space:nowrap;display:inline-block}
.vp{background:var(--green-bg);color:var(--green)}
.vn{background:var(--red-bg);color:var(--red)}
.vz{background:var(--bg4);color:var(--t3)}

/* ── Mini bar ── */
.mbar{display:flex;align-items:center;gap:6px}
.mbar-t{flex:1;height:4px;background:var(--bg4);border-radius:2px;min-width:50px;overflow:hidden}
.mbar-f{height:4px;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── Revenue bar ── */
.rbar{height:3px;background:var(--bg4);border-radius:2px;margin-top:5px;overflow:hidden}
.rbar-f{height:3px;background:var(--blue);border-radius:2px;transition:width .6s ease}
.rmono{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500}

/* ── Split layout ── */
.split{display:grid;grid-template-columns:200px 1fr;gap:14px;align-items:start}
.list-panel{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);overflow:hidden;position:sticky;top:0;max-height:calc(100vh - 64px);overflow-y:auto}
.list-head{padding:10px 14px;border-bottom:1px solid var(--bd);font-size:9px;font-weight:700;letter-spacing:2px;color:var(--t3);text-transform:uppercase;flex-shrink:0}
.li{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bd);border-left:3px solid transparent;transition:all .12s}
.li:last-child{border-bottom:none}
.li:hover{background:var(--bg3)}
.li.sel{background:var(--bg3);border-left-color:var(--blue)}
.li-name{font-size:12px;font-weight:500;color:var(--t1)}
.li-sub{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace;margin-top:2px}

/* ── Seller detail ── */
.profile{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:20px;margin-bottom:12px}
.pname{font-size:20px;font-weight:700;letter-spacing:-.4px;margin-bottom:6px}
.pmeta{display:flex;gap:8px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.pm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:9px;overflow:hidden;margin-bottom:16px}
.pm-item{background:var(--bg2);padding:14px 16px}
.pm-l{font-size:9px;letter-spacing:1.5px;color:var(--t3);text-transform:uppercase;font-weight:700;margin-bottom:6px}
.pm-v{font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--t1)}
.pm-vs{font-size:11px;font-family:'IBM Plex Mono',monospace;margin-top:4px}
.vs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.vs-item{}
.vs-lbl{font-size:9px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.cat-row{display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid var(--bd)}
.cat-row:last-child{border-bottom:none}
.cat-name{flex:1;font-size:12px;color:var(--t1)}
.cat-rev{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--t2);text-align:right;min-width:90px}

/* ── Plan ── */
.plan-prog{height:4px;background:var(--bg4);border-radius:2px;margin-bottom:16px;overflow:hidden}
.plan-prog-f{height:4px;border-radius:2px;background:var(--green);transition:width .5s ease}
.plan-prog-l{font-size:10px;color:var(--t3);margin-bottom:6px;display:flex;justify-content:space-between}
.day-block{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.day-h{padding:9px 16px;background:var(--bg3);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.day-lbl{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--t2);text-transform:uppercase}
.day-prog{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono',monospace}
.day-body{padding:10px 12px}
.action{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;border-radius:8px;border:1px solid var(--bd);margin-bottom:6px;cursor:pointer;transition:all .12s}
.action:last-child{margin-bottom:0}
.action:hover{border-color:var(--bd2);background:var(--bg3)}
.action.done{opacity:.35}
.action.done .atxt{text-decoration:line-through}
.chk{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--bd2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;margin-top:2px;transition:all .15s}
.chk.on{background:var(--green);border-color:var(--green)}
.abadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:4px;letter-spacing:.5px;text-transform:uppercase}
.atxt{font-size:12px;color:var(--t2);line-height:1.5}

/* ── Focus ── */
.focus-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:18px;transition:border .15s}
.fc:hover{border-color:var(--bd2)}
.fbadge{font-size:9px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:1px;text-transform:uppercase;display:inline-block;margin-bottom:10px}
.fname{font-size:14px;font-weight:600;color:var(--t1);margin-bottom:5px}
.fsub{font-size:11px;color:var(--t2);line-height:1.6}
.flink{margin-top:10px;font-size:11px;color:var(--blue);cursor:pointer;font-weight:500;display:inline-block}
.flink:hover{text-decoration:underline}

/* ── Category view ── */
.cr{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--bd)}
.cr:last-child{border-bottom:none}
.cr-rank{font-size:11px;color:var(--t3);font-family:'IBM Plex Mono',monospace;min-width:20px}
.cr-name{flex:1;font-size:12px;font-weight:500;color:var(--t1)}
.cr-rev{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--t2);min-width:100px;text-align:right}

/* ── Search & pills ── */
.search{width:100%;padding:9px 14px;border-radius:var(--r);border:1px solid var(--bd);background:var(--bg2);color:var(--t1);font-size:13px;font-family:'Outfit',sans-serif;margin-bottom:14px;outline:none;transition:border .15s}
.search:focus{border-color:var(--bd2)}
.search::placeholder{color:var(--t3)}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:5px 13px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--t3);font-size:11px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .12s}
.pill:hover{border-color:var(--bd2);color:var(--t1)}
.pill.on{background:var(--blue-bg);border-color:var(--blue-bd);color:var(--blue)}

/* ── Misc ── */
.empty{color:var(--t3);font-size:13px;padding:40px;text-align:center}
.section-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-t{font-size:14px;font-weight:600;color:var(--t1)}
.anim{animation:fadeUp .22s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
@media print{.sidebar,.toast{display:none!important}.main{margin-left:0!important;padding:16px!important}}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0;padding:18px}.kpi-grid{grid-template-columns:repeat(2,1fr)}.split,.focus-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-tag">Sales OS</div>
    <div class="sb-name" id="sbName">ДМ2 Мост-2</div>
    <div class="sb-period" id="sbPeriod">Квітень 2026</div>
  </div>
  <nav class="nav" id="nav">
    <div class="ni active" data-v="overview" onclick="go('overview')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1.2"/><rect x="9" y="1" width="6" height="6" rx="1.2"/><rect x="1" y="9" width="6" height="6" rx="1.2"/><rect x="9" y="9" width="6" height="6" rx="1.2"/></svg>
      Огляд
    </div>
    <div class="ni" data-v="sellers" onclick="go('sellers')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="5" r="2.5"/><path d="M1 13c0-2.76 2.24-5 5-5s5 2.24 5 5"/><circle cx="12.5" cy="5.5" r="1.8"/><path d="M15 12c0-1.66-1.12-2.5-2.5-2.5"/></svg>
      Продавці
    </div>
    <div class="ni" data-v="categories" onclick="go('categories')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h12M2 8h12M2 12h12"/><circle cx="5" cy="4" r="1.2" fill="currentColor" stroke="none"/><circle cx="8" cy="8" r="1.2" fill="currentColor" stroke="none"/><circle cx="11" cy="12" r="1.2" fill="currentColor" stroke="none"/></svg>
      Категорії
    </div>
    <div class="ni" data-v="plan" onclick="go('plan')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="1.5"/><path d="M5.5 8l2 2 3.5-3.5"/></svg>
      План дій
    </div>
    <div class="ni" data-v="focus" onclick="go('focus')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><circle cx="8" cy="8" r="2.5"/><path d="M8 2v1.5M8 12.5V14M2 8h1.5M12.5 8H14"/></svg>
      Фокус дня
    </div>
  </nav>
  <div class="sb-foot">
    <label class="up-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".xlsx,.xls">
      <div class="up-label">Завантажити звіт</div>
      <div class="up-hint">.xlsx · перетягни або натисни</div>
    </label>
    <div class="sb-keys">Клавіші 1–5 для навігації</div>
  </div>
</aside>

<main class="main">
  <div class="page-head">
    <div>
      <div class="page-title" id="pageTitle">Огляд магазину</div>
      <div class="page-sub" id="pageSub">01.04 – 17.04.2026 · ДМ2 Мост-2</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="window.print()">Друк / PDF</button>
    </div>
  </div>
  <div id="kpiRow" class="kpi-grid"></div>
  <div id="content" class="anim"></div>
</main>

<div class="toast" id="toast"></div>

<script>
// ═══ CONSTANTS ═══════════════════════════════════════════════════════════════
const SHORT={
  'Зуєва Ольга Андріївна':'Зуєва О.','Кисельов Дмитро Сергійович':'Кисельов Д.',

  'Бугас Данило Олександрович':'Бугас Д.','Куценко Майя Сергіївна':'Куценко М.',

  'Переяслов Микита Олегович':'Переяслов М.','Гапонов Ігор Євгенович':'Гапонов І.',
  'Дідусь Ярослав Валентинович':'Дідусь Я.'
};

const ACTDEF=[
  {type:'talk',label:'Особиста бесіда',color:'#4f8ef7',bg:'rgba(79,142,247,.15)'},
  {type:'train',label:'Навчання',color:'#a78bfa',bg:'rgba(167,139,250,.15)'},
  {type:'test',label:'Тестова консультація',color:'#f5a623',bg:'rgba(245,166,35,.15)'},
  {type:'coaching',label:'Тренінг',color:'#34d399',bg:'rgba(52,211,153,.15)'},
  {type:'stock',label:'Контроль залишків',color:'#f87171',bg:'rgba(248,113,113,.15)'}
];

const VIEWS={
  overview:'Огляд магазину',sellers:'Продавці',
  categories:'Аналіз категорій',plan:'План дій',focus:'Фокус дня'
};

const PLANS={
  'Зуєва О.':[
    {day:'Пн',actions:[{type:'talk',text:'Обговорити ASP Мультипіч та Кавомашина — нижче бенчмарку'},{type:'stock',text:'Перевірити залишки Philips прасок (лідер категорії)'}]},
    {day:'Вт',actions:[{type:'train',text:'Навчання апселлу — Кавомашина та Пилосос ручний'}]},
    {day:'Ср',actions:[{type:'test',text:'Тестова консультація — продаж пилососа вище середньої ціни'}]},
    {day:'Чт',actions:[{type:'stock',text:'Аудит залишків — слабкі категорії Навушники та Мультипіч'}]},
    {day:'Пт',actions:[{type:'coaching',text:'Тренінг: підвищення ASP Мультипіч — від 4407 до 5000+'}]}
  ],
  'Кисельов Д.':[
    {day:'Пн',actions:[{type:'talk',text:'Кухонна машина — виторг на 3.7% від бенч., розібрати разом'}]},
    {day:'Вт',actions:[{type:'train',text:'Навчання продуктів Bosch/SEB для Кухонних машин'},{type:'stock',text:'Перевірити залишки Кухонна машина'}]},
    {day:'Ср',actions:[{type:'test',text:'Тестова консультація — Акустична система'}]},
    {day:'Чт',actions:[{type:'coaching',text:'Тренінг: перенести навичку з Навушників (сильна) на інші категорії'}]},
    {day:'Пт',actions:[{type:'talk',text:'Підсумки тижня, постановка фокусу на наступний'}]}

const avg=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;
const tc=t=>t==='A'?'tA':t==='B'?'tB':t==='C'?'tC':'tD';
const vc=v=>v>=.03?'vp':v<=-.03?'vn':'vz';
const adef=t=>ACTDEF.find(a=>a.type===t)||ACTDEF[0];

function assignTiers(arr){
  const sorted=[...arr].filter(s=>s.revenue>0).sort((a,b)=>b.revenue-a.revenue);
  const n=sorted.length;
  sorted.forEach((s,i)=>{
    if(i<Math.ceil(n*.36))s.tier='A';
    else if(i<Math.ceil(n*.55))s.tier='B';
    else if(i<Math.ceil(n*.82))s.tier='C';
    else s.tier='D';
  });
  arr.filter(s=>s.revenue<=0).forEach(s=>s.tier='D');
  return arr;
}

    m[c.cat].sellers.push({name:s.name,full:s.full,rev:c.rev,revVs:c.revVs,aspVs:c.aspVs,tier:s.tier});
  }));
  return Object.values(m).sort((a,b)=>a.cat.localeCompare(b.cat));
}

function toast(msg,type='info'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type+' show';
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),3500);
}

function vsBar(v,max=2){
  const c=Math.max(-max,Math.min(max,v||0));
  const p=Math.round(Math.abs(c)/max*100);
  const col=v>=0?'#34d399':'#f87171';
  return `<div class="mbar"><div class="mbar-t"><div class="mbar-f" style="width:${p}%;background:${col}"></div></div><span class="vs ${vc(v)}">${pct(v)}</span></div>`;
}

// ═══ PARSE ════════════════════════════════════════════════════════════════════
function parseFile(ab){
  const wb=XLSX.read(ab,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  const sm={};
  for(let i=18;i<rows.length;i++){
    const r=rows[i];
    if(String(r[7]||'').trim()!=='Прод')continue;
    const brand=String(r[4]||'').trim();
    if(brand&&brand!=='nan'&&brand.length>2&&!/^\s+$/.test(brand))continue;
    const seller=String(r[5]||'').trim();
    if(!seller||seller.length<3||/^\s+$/.test(seller))continue;
    const cat=String(r[2]||'').trim();
    if(!cat)continue;
    const rev=parseFloat(r[9])||0, revVs=parseFloat(r[11])||0;
    const units=parseFloat(r[12])||0, unitsVs=parseFloat(r[14])||0;
    const aspVs=parseFloat(r[17])||0;
    const sn=SHORT[seller]||seller.split(' ').slice(0,2).join(' ');
    if(!sm[seller])sm[seller]={name:sn,full:seller,revenue:0,units:0,revVsArr:[],aspVsArr:[],unitsVsArr:[],cats:{}};
    sm[seller].revenue+=rev; sm[seller].units+=units;
    sm[seller].revVsArr.push(revVs); sm[seller].aspVsArr.push(aspVs); sm[seller].unitsVsArr.push(unitsVs);
    if(rev>0){
      if(!sm[seller].cats[cat])sm[seller].cats[cat]={rev:0,units:0,rvArr:[],avArr:[]};
      sm[seller].cats[cat].rev+=rev; sm[seller].cats[cat].units+=units;
      sm[seller].cats[cat].rvArr.push(revVs); sm[seller].cats[cat].avArr.push(aspVs);
    }
  }
  const sellers=Object.values(sm).map(s=>({
    name:s.name,full:s.full,revenue:s.revenue,units:s.units,
    asp:s.units>0?s.revenue/s.units:0,
    revVs:avg(s.revVsArr),aspVs:avg(s.aspVsArr),unitsVs:avg(s.unitsVsArr),
    cats:Object.entries(s.cats).map(([cat,v])=>({
      cat,rev:v.rev,units:v.units,revVs:avg(v.rvArr),aspVs:avg(v.avArr)
    })).sort((a,b)=>b.rev-a.rev)
  })).sort((a,b)=>b.revenue-a.revenue);
  return {sellers:assignTiers(sellers), cats:buildCatIndex(sellers)};
}

// ═══ RENDER KPI ════════════════════════════════════════════════════════════
function renderKPI(){
  const s=S.sellers.filter(x=>x.revenue>0);
  const totR=s.reduce((a,x)=>a+x.revenue,0);
  const totU=s.reduce((a,x)=>a+x.units,0);
  const aspA=totU>0?totR/totU:0;
  const vsA=s.length?avg(s.map(x=>x.revVs)):0;
  const d=s.filter(x=>x.tier==='D').length;
  const defs=[
    {l:'Виторг',v:fmt(totR)+' ₴',s:'за поточний період',a:'var(--blue)'},
    {l:'Штуки продано',v:fmt(totU),s:'одиниць',a:'var(--purple)'},
    {l:'Середній чек',v:fmt(aspA)+' ₴',s:'грн на одиницю',a:'var(--green)'},
    {l:'Vs бенчмарк',v:pct(vsA),s:'ср. відхилення магазину',a:vsA>=0?'var(--green)':'var(--red)'},
    {l:'Продавців',v:String(s.length),s:`тир D (увага): ${d}`,a:d>0?'var(--red)':'var(--amber)'}
  ];
  document.getElementById('kpiRow').innerHTML=defs.map(k=>`
    <div class="kpi" style="--a:${k.a}">

}

  let detail=`<div class="empty">← Оберіть продавця</div>`;
  if(S.selSeller){
    const s=sellers.find(x=>x.name===S.selSeller);
    const plan=PLANS[S.selSeller]||PLANS.default;

    const days=plan.map((day,di)=>{

          </div>

      }).join('');
      const dc=day.actions.filter((_,ai)=>S.checks[`${S.selSeller}-${di}-${ai}`]).length;
      return `<div class="day-block">
        <div class="day-h">
          <span class="day-lbl">${day.day}</span>
          <span class="day-prog">${dc}/${day.actions.length}</span>

      </div>`;
  }
  return `<div class="split"><div class="list-panel"><div class="list-head">Продавці</div>${list}</div><div>${detail}</div></div>`;
}

function renderFocus(){
  const active=S.sellers.filter(s=>s.revenue>0).sort((a,b)=>a.revVs-b.revVs);
  const urgent=active.filter(s=>s.tier==='D');
  const aspWeak=active.filter(s=>s.aspVs<-.1&&s.tier!=='D').slice(0,3);

  const allCats={};
  S.sellers.forEach(s=>(s.cats||[]).forEach(c=>{
    if(!allCats[c.cat]){allCats[c.cat]={cat:c.cat,total:0,cnt:0}}

  const fc=(title,badge,badgeSty,items,empty)=>`
    <div>

  return `<div class="focus-grid">
    ${fc('Термінові дії','Тир D · Увага','background:var(--red-bg);color:var(--red)',
      urgent.map(s=>({...s,sub:`Виторг нижче бенчм. на ${pct(Math.abs(s.revVs))}`,

      'Немає критичних ситуацій')}
    ${fc('Низький ASP — тренінг','Увага ASP','background:var(--amber-bg);color:var(--amber)',
      aspWeak.map(s=>({...s,sub:`ASP vs бенчм.: ${pct(s.aspVs)}. Рекомендація: тренінг апселлу`})),

    ${fc('Лідери → наставники','Тир A · Лідер','background:var(--green-bg);color:var(--green)',
      stars.map(s=>({...s,sub:`Виторг: ${pct(s.revVs)} vs бенчм. Може навчати тир D`})),

          </div>`).join(''):`<div class="empty" style="padding:16px">Завантажте звіт</div>`}
      </div>

  </div>`;
}

// ═══ FILE UPLOAD ═════════════════════════════════════════════════════════════
function handleFile(file){
  if(!file) return;
  toast('Читаємо файл...','info');
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const {sellers,cats}=parseFile(new Uint8Array(ev.target.result));
      if(!sellers.length){toast('Не знайдено рядків продавців. Перевірте формат.','err');return;}
      S.sellers=sellers; S.cats=cats; S.selSeller=null; S.selCat=null;
      const name=file.name.replace(/\.(xlsx|xls)$/i,'');
      document.getElementById('sbName').textContent='ДМ2 Мост-2';
      document.getElementById('sbPeriod').textContent=name;
      document.getElementById('pageSub').textContent=`${name} · ${sellers.length} продавців · ${cats.length} категорій`;
      toast(`Завантажено: ${sellers.length} продавців, ${cats.length} категорій`,'ok');
      render();
    }catch(e){toast('Помилка: '+e.message,'err');}
  };
  reader.readAsArrayBuffer(file);
}
